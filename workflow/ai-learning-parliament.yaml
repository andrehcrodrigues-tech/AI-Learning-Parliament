kind: workflow
name: ai-learning-parliament
trigger:
  kind: OnConversationStart
  id: trigger_wf
  actions:
    - kind: SetVariable
      id: set_initial_message
      variable: Local.LatestMessage
      value: =UserMessage(System.LastMessageText)

    - kind: InvokeAzureAgent
      id: learning_curator_agent
      description: Invokes the Learning Curator Agent
      conversationId: =System.ConversationId
      agent:
        name: "Learning-Curator-Agent"
      input:
        messages: =Local.LatestMessage
      output:
        messages: Local.LatestMessage
        autoSend: true

    - kind: InvokeAzureAgent
      id: study_plan_agent
      description: Invokes the Study Plan Agent
      conversationId: =System.ConversationId
      agent:
        name: "Study-Plan-Agent"
      input:
        messages: =Local.LatestMessage
      output:
        messages: Local.LatestMessage
        autoSend: true

    - kind: InvokeAzureAgent
      id: workload_agent
      description: Invokes the Workload Agent
      conversationId: =System.ConversationId
      agent:
        name: "Workload-Agent"
      input:
        messages: =Local.LatestMessage
      output:
        messages: Local.LatestMessage
        autoSend: true

    - kind: InvokeAzureAgent
      id: assessment_agent
      description: Invokes the Assessment Agent
      conversationId: =System.ConversationId
      agent:
        name: "Assessment-Agent"
      input:
        messages: =Local.LatestMessage
      output:
        messages: Local.LatestMessage
        autoSend: true

    - kind: InvokeAzureAgent
      id: manager_agent
      description: Invokes the Manager Agent
      conversationId: =System.ConversationId
      agent:
        name: "Manager-Agent"
      input:
        messages: =Local.LatestMessage
      output:
        messages: Local.LatestMessage
        autoSend: true

    - kind: InvokeAzureAgent
      id: business_value_agent
      description: Invokes the Business Value Agent
      conversationId: =System.ConversationId
      agent:
        name: "Business-Value-Agent"
      input:
        messages: =Local.LatestMessage
      output:
        messages: Local.LatestMessage
        autoSend: true

    - kind: InvokeAzureAgent
      id: career_growth_agent
      description: Invokes the Career Growth Agent
      conversationId: =System.ConversationId
      agent:
        name: "Career-Growth-Agent"
      input:
        messages: =Local.LatestMessage
      output:
        messages: Local.LatestMessage
        autoSend: true

    - kind: InvokeAzureAgent
      id: future_skills_agent
      description: Invokes the Future Skills Agent
      conversationId: =System.ConversationId
      agent:
        name: "Future-Skills-Agent"
      input:
        messages: =Local.LatestMessage
      output:
        messages: Local.LatestMessage
        autoSend: true

    - kind: InvokeAzureAgent
      id: critic_agent
      description: Invokes the Critic Agent
      conversationId: =System.ConversationId
      agent:
        name: "Critic-Agent"
      input:
        messages: =Local.LatestMessage
      output:
        messages: Local.LatestMessage
        autoSend: true

    - kind: InvokeAzureAgent
      id: speaker_agent
      description: Invokes the Speaker Agent to generate the final Certification Readiness Report
      conversationId: =System.ConversationId
      agent:
        name: "Speaker-Agent"
      input:
        messages: =Local.LatestMessage
      output:
        messages: Local.LatestMessage
        autoSend: true

    - kind: EndConversation
      id: end_workflow

id: ai_learning_parliament
description: Multi-agent certification readiness workflow using Microsoft Foundry.
