name: CI

on:
  push:
  pull_request:

jobs:
  validate-repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate required folders
        run: |
          test -d agents
          test -d workflow
          test -d knowledge-base
          test -d demo
          test -d docs
          test -f README.md
